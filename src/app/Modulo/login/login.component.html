<section id="home">
  <div class="login-container">
    <div class="login-card">
      <div class="user-avatar">
        <div class="avatar-circle"></div>
      </div>

      <h1 class="welcome-title">BIENVENIDO</h1>
      <p class="welcome-subtitle">Inicia sesión para continuar</p>

      <form [formGroup]="loginForm" class="login-form">
        <!-- CAMPO USUARIO -->
        <div class="form-group">
          <label for="Login" class="form-label">Usuario</label>
          <div class="input-wrapper">
            <span class="input-icon user-icon"></span>
            <input
              type="text"
              id="Login"
              placeholder="Ingrese su usuario"
              formControlName="login"
              class="form-input"
              [class.input-error]="d['login'].invalid && (d['login'].dirty || d['login'].touched)"
            >
          </div>
          <div class="error-message" *ngIf="d['login'].invalid && (d['login'].dirty || d['login'].touched)">
            <span class="error-icon">⚠</span>
            <span *ngIf="d['login'].errors?.['required']">El usuario es requerido</span>
          </div>
        </div>

        <!-- CAMPO CONTRASEÑA -->
        <div class="form-group">
          <label for="Password" class="form-label">Contraseña</label>
          <div class="input-wrapper">
            <span class="input-icon lock-icon"></span>
            <input
              type="password"
              id="Password"
              placeholder="Ingrese su contraseña"
              formControlName="password"
              class="form-input"
              [class.input-error]="d['password'].invalid && (d['password'].dirty || d['password'].touched)"
            >
          </div>
          <div class="error-message" *ngIf="d['password'].invalid && (d['password'].dirty || d['password'].touched)">
            <span class="error-icon">⚠</span>
            <span *ngIf="d['password'].errors?.['required']">La contraseña es requerida</span>
          </div>
        </div>

        <!-- BOTÓN SUBMIT -->
        <button type="button" class="btn-submit" (click)="guardarDatos()">
          <span class="btn-text">Iniciar Sesión</span>
          <span class="btn-icon">→</span>
        </button>
      </form>
    </div>
  </div>
</section>
